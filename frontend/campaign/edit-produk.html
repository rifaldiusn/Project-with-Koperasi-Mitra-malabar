<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Produk - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <form id="form-edit-produk">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 id="page-title">Edit Produk</h1>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <a href="produk.html" class="btn btn-outline">Batal</a>
                        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:1.5rem;">
                    
                    <div class="detail-card">
                        <div class="card-title-icon" style="margin-bottom: 1rem;">
                            <i class="ph ph-info" style="color:#6D8A21; font-size:1.25rem;"></i> Informasi Dasar
                        </div>
                        <div style="display:flex; gap:3rem;">
                            <div style="flex:1;">
                                <div class="form-group">
                                    <label class="form-label">Nama Produk</label>
                                    <input type="text" id="prod-nama" class="form-control" value="Kopi Arabika Malabar" required>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Kode Produk (SKU)</label>
                                        <input type="text" id="prod-sku" class="form-control" value="MLB-ARB-001" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Status Produk</label>
                                        <div class="status-toggle-group">
                                            <label class="status-radio active">
                                                <input type="radio" name="status" value="Active" checked> 
                                                <i class="ph-fill ph-check-circle" style="color:#6D8A21;"></i> Active
                                            </label>
                                            <label class="status-radio">
                                                <input type="radio" name="status" value="Draft"> 
                                                <i class="ph ph-circle"></i> Draft
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div style="width:150px; display:flex; flex-direction:column; align-items:center;">
                                <div class="image-upload-circle" style="background-image: url('https://images.unsplash.com/photo-1559525839-b184a4d698c7?w=200&q=80');">
                                    <div class="upload-overlay"><i class="ph ph-camera"></i></div>
                                </div>
                            </div>
                        </div>
                    </div> <!-- End of Informasi Dasar card -->

                    <div class="detail-card"> <!-- Start of Variasi Produk card -->
                        <div class="detail-card-header" style="border-bottom:none; padding-bottom:0.5rem; display: flex; justify-content: space-between; align-items: center;">
                            <div class="card-title-icon">
                                <i class="ph ph-list-dashes" style="color:#6D8A21; font-size:1.25rem;"></i> Variasi Produk
                            </div>
                            <button type="button" class="btn-text-action" id="btn-tambah-variasi">+ Tambah Variasi</button>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>NAMA VARIASI</th>
                                    <th>KODE VARIASI</th>
                                    <th>HARGA (RP)</th>
                                    <th>STATUS</th>
                                    <th>AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="variasi-table-body">
                            </tbody>
                        </table>
                        <div style="margin-top: 1rem; text-align: right;">
                            <button type="button" id="btn-simpan-variasi" class="btn btn-primary">Simpan Variasi</button>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="card-title-icon" style="margin-bottom: 1rem;">
                            <i class="ph ph-trend-up" style="color:#6D8A21; font-size:1.25rem;"></i> Metrik Interaksi
                        </div>
                        
                        <div class="form-group">
                            <div class="card-title-icon" style="margin-bottom: 0.5rem; font-size:0.875rem;">
                                <i class="ph ph-calendar-blank"></i> Periode data produk
                            </div>
                            <label class="form-label">Tanggal Produk</label>
                            <input type="date" class="form-control" id="metrik-periode" style="max-width:300px;">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Jumlah dilihat</label>
                                <input type="number" class="form-control" id="metrik-dilihat" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Jumlah diklik</label>
                                <input type="number" class="form-control" id="metrik-diklik" placeholder="0">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Jumlah suka</label>
                                <input type="number" class="form-control" id="metrik-suka" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Jumlah masukkan keranjang</label>
                                <input type="number" class="form-control" id="metrik-keranjang" placeholder="0">
                            </div>
                        </div>
                        <div style="margin-top: 1rem; text-align: right;">
                            <button type="button" id="btn-edit-metrik" class="btn btn-secondary" style="display:none; margin-right: 0.5rem;">Edit Metrik</button>
                            <button type="button" id="btn-simpan-metrik" class="btn btn-primary">Simpan Metrik</button>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="card-title-icon" style="margin-bottom: 1rem;">
                            <i class="ph ph-truck" style="color:#6D8A21; font-size:1.25rem;"></i> Pelacakan Pesanan
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Periode produk dipesan</label>
                            <input type="date" class="form-control" id="pesan-periode" style="max-width:300px;">
                        </div>

                        <div class="card-title-icon" style="margin-bottom: 0.5rem; margin-top: 1rem; font-size:0.875rem;">
                            <i class="ph ph-factory"></i> Metrik Produksi
                        </div>
                        <input type="number" class="form-control mb-4" id="pesan-dibuat" placeholder="Jumlah diproduksi">

                        <div class="card-title-icon" style="margin-bottom: 0.5rem; margin-top: 1rem; font-size:0.875rem;">
                            <i class="ph ph-package"></i> Logistik Pengiriman
                        </div>
                        <label class="form-label">Jumlah produk dikirim (Unit)</label>
                        <input type="number" class="form-control" id="pesan-dikirim" placeholder="0">
                        
                        <div style="margin-top: 1rem; text-align: right;">
                            <button type="button" id="btn-edit-pesan" class="btn btn-secondary" style="display:none; margin-right: 0.5rem;">Edit Pesanan</button>
                            <button type="button" id="btn-simpan-pesan" class="btn btn-primary">Simpan Pesanan</button>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="card-title-icon" style="margin-bottom: 1rem;">
                            <i class="ph ph-chart-bar" style="color:#6D8A21; font-size:1.25rem;"></i> Analisis Penjualan
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Variasi Produk</label>
                            <select class="form-control" id="jual-variasi">
                                <option value="">Pilih Variasi...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Periode data produk penjualan</label>
                            <input type="date" class="form-control" id="jual-periode">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Jumlah nominal penjualan</label>
                                <div class="input-with-icon">
                                    <span style="position:absolute; left:12px; top:10px; color:#555; font-size:0.875rem;">Rp</span>
                                    <input type="number" class="form-control" id="jual-nominal" placeholder="0" style="padding-left:35px;">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Jenis penjualan</label>
                                <select class="form-control" id="jual-jenis">
                                    <option value="1">Retail (Eceran)</option>
                                    <option value="2">Grosir</option>
                                </select>
                            </div>
                        </div>

                        <div style="margin-top: 1rem; text-align: right;">
                            <button type="button" id="btn-edit-jual" class="btn btn-secondary" style="display:none; margin-right: 0.5rem;">Edit Penjualan</button>
                            <button type="button" id="btn-simpan-jual" class="btn btn-primary">Simpan Penjualan</button>
                        </div>
                    </div>

                </div>
            </form>
        </main>
    </div>
    
    <script src="../js/api.js?v=4"></script>
    <script src="../js/layout.js?v=4"></script>
    <script src="../js/admin-core.js?v=4"></script>
    <script src="../js/admin-form-produk.js?v=4"></script>
</body>
</html>
