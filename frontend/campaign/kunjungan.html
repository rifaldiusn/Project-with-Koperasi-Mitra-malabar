<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kunjungan - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Data Kunjungan</h1>
                    <p>Kelola dan pantau jadwal kunjungan customer Anda.</p>
                </div>
                <a href="tambah-kunjungan.html" class="btn btn-primary">
                    <i class="ph ph-plus" style="margin-right: 0.5rem;"></i>
                    Tambah Kunjungan
                </a>
            </div>

            <div class="filter-container" style="display: grid; grid-template-columns: 1fr auto auto; gap: 1rem; align-items: end;">
                <div style="width: 100%;">
                    <label class="form-label" style="font-weight: 500; margin-bottom: 0.5rem; display: block; color: var(--text-muted);">Cari Kunjungan</label>
                    <input type="text" id="search-kunjungan" class="form-control" placeholder="Cari berdasarkan nama kunjungan atau nama customer..." style="width: 100%;">
                </div>
                <div>
                    <label class="form-label" style="font-weight: 500; margin-bottom: 0.5rem; display: block; color: var(--text-muted);">Periode Mulai</label>
                    <input type="date" id="date-start" class="form-control" style="width: 180px;" title="Tanggal mulai periode kunjungan">
                </div>
                <div>
                    <label class="form-label" style="font-weight: 500; margin-bottom: 0.5rem; display: block; color: var(--text-muted);">Periode Akhir</label>
                    <input type="date" id="date-end" class="form-control" style="width: 180px;" title="Tanggal batas akhir kunjungan">
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>No</th><th>Nama Kunjungan</th><th>Customer</th><th>Tanggal</th><th>Tujuan</th><th style="text-align:right;">Aksi</th></tr>
                    </thead>
                    <tbody id="kunjungan-table-body">
                        <!-- Diisi otomatis oleh JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/kunjungan.js?v=4"></script>
</body>
</html>
