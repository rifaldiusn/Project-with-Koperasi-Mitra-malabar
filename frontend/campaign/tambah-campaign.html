<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Campaign - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Tambah Campaign</h1>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="campaign.html" class="btn btn-outline">Batal</a>
                    <button type="submit" form="form-tambah-campaign" class="btn btn-primary">Simpan Campaign</button>
                </div>
            </div>

            <div class="form-card">
                <h2 class="form-card-title">Informasi Campaign Baru</h2>
                <p class="form-card-subtitle">Lengkapi data di bawah ini untuk menambahkan campaign baru ke dalam sistem Malabar.</p>

                <form id="form-tambah-campaign">
                    <div class="form-group">
                        <label class="form-label">Nama Campaign</label>
                        <input type="text" id="campaign-nama" class="form-control" placeholder="Masukkan nama program campaign" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Tanggal Mulai</label>
                            <input type="date" id="campaign-mulai" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tenggat Waktu (Deadline)</label>
                            <input type="date" id="campaign-deadline" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Total Anggaran (Budget Total)</label>
                        <input type="number" id="campaign-budget" class="form-control" placeholder="Contoh: 45000000" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Keterangan / Deskripsi</label>
                        <textarea id="campaign-deskripsi" class="form-control" rows="4" placeholder="Masukkan rincian singkat mengenai fokus atau tujuan utama dari program campaign..."></textarea>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script src="../js/api.js?v=2"></script>
    <script src="../js/layout.js?v=2"></script>
    <script src="../js/admin-core.js?v=2"></script>
    <script src="../js/admin-tambah-campaign.js?v=2"></script>
</body>
</html>
