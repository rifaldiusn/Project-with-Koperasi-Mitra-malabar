<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header header-spacing" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="page-title">
                    <h1 style="margin: 0;">Daftar Produk</h1>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="tambah-produk.html" class="btn btn-primary">
                        <i class="ph ph-plus" style="margin-right:0.5rem;"></i> Tambah Produk
                    </a>
                </div>
            </div>

            <div class="filter-container" style="justify-content: space-between;">
                <div style="position:relative; flex:1;">
                    <i class="ph ph-magnifying-glass" style="position:absolute; left:12px; top:12px; color:#aaa;"></i>
                    <input type="text" id="search-produk" class="form-control" placeholder="Search products..." style="padding-left:35px;">
                </div>
                <button class="btn-text-action" style="color:#555;"><i class="ph ph-funnel"></i> Filter</button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Product Name</th>
                            <th>Product Code</th>
                            <th>Status</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="produk-table-body">
                        <tr>
                            <td>1</td>
                            <td>Kopi Arabika Malabar</td>
                            <td>PRD-001</td>
                            <td><span class="status-pill status-active">Aktif</span></td>
                            <td style="text-align:right;">
                                <div class="dropdown-wrapper">
                                    <button class="dropdown-toggle" data-dropdown-target="dropdown-prod-1">
                                        <i class="ph ph-dots-three-vertical" style="font-size: 20px;"></i>
                                    </button>
                                    <div class="dropdown-menu" id="dropdown-prod-1">
                                        <a href="edit-produk.html" class="dropdown-item">
                                            <i class="ph ph-pencil" style="margin-right: 0.5rem;"></i>Edit
                                        </a>
                                        <button class="dropdown-item danger">
                                            <i class="ph ph-trash" style="margin-right: 0.5rem;"></i>Hapus
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="pagination" style="color:#777; font-size:0.875rem;">
                    <span id="page-info">Showing 1 to 5 of 24 entries</span>
                    <div class="page-numbers">
                        <button class="page-btn"><i class="ph ph-caret-left"></i></button>
                        <button class="page-btn active" style="background:#A3C644; border:none; color:white;">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <span>...</span>
                        <button class="page-btn"><i class="ph ph-caret-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/produk.js"></script>
</body>
</html>
