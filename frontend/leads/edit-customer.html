<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Edit Customer</h1>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="customer.html" class="btn btn-outline">Batal</a>
                    <button type="submit" form="form-edit-customer" class="btn btn-primary">Simpan Customer</button>
                </div>
            </div>

            <div class="form-card">
                <h2 class="form-card-title">Informasi Customer</h2>
                <p class="form-card-subtitle">Perbarui data di bawah ini untuk mengubah profil customer dalam sistem.</p>

                <form id="form-edit-customer">
                    <input type="hidden" id="cust-id">
                    
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="cust-nama" class="form-control" placeholder="Masukkan nama lengkap sesuai identitas" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nomor Telepon</label>
                            <input type="text" id="cust-telp" class="form-control" placeholder="Contoh: 081234567890" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="cust-email" class="form-control" placeholder="alamat@email.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis Customer</label>
                        <select id="cust-jenis" class="form-control" required>
                            <option value="">Pilih jenis customer</option>
                            <option value="cafe">Cafe</option>
                            <option value="retail">Retail</option>
                            <option value="perorangan">Perorangan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Alamat Domisili</label>
                        <textarea id="cust-alamat" class="form-control" rows="3" placeholder="Masukkan alamat lengkap (Jalan, RT/RW, Desa/Kelurahan)" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Link Google Maps</label>
                        <div style="position:relative;">
                            <i class="ph ph-map-pin" style="position:absolute; left:12px; top:12px; color:#6D8A21; font-size:18px;"></i>
                            <input type="url" id="cust-link" class="form-control" placeholder="Tempel link Google Maps di sini (contoh: https://maps.app.goo.gl/...)" style="padding-left:38px;">
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-edit-customer.js"></script>
    <script>
        document.getElementById('form-edit-customer').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.querySelector('button[form="form-edit-customer"]');
            if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan...'; }
            try {
                await new Promise(resolve => setTimeout(resolve, 500));
                showToast('Customer berhasil diperbarui!', 'success');
                addNotification('Data customer telah diperbarui');
                setTimeout(() => { window.location.href = 'customer.html'; }, 1000);
            } catch (error) {
                showToast('Gagal memperbarui customer.', 'error');
            } finally {
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Simpan Customer'; }
            }
        });
    </script>
</body>
</html>
