<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-text" style="color:#4A5B22;">Mitra Malabar</div></div>
            <nav class="sidebar-menu">
               <a href="dashboard.html" class="menu-item active">Dashboard</a>
                <a href="customer.html" class="menu-item">Customer</a>
                <a href="kunjungan.html" class="menu-item">Kunjungan</a>
                <a href="produk.html" class="menu-item">Produk</a>
                <a href="riwayat.html" class="menu-item">Riwayat</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
    <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Cari...">
    </div>
    
    <div class="user-profile">
        <button class="btn-icon">🔔</button>
        <button class="btn-icon">⚙️</button>
        
        <a href="profil.html" style="display: flex; align-items: center;">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=150&q=80" 
                 alt="User" 
                 class="avatar" 
                 style="cursor: pointer; transition: opacity 0.2s; border: 2px solid #547115;" 
                 onmouseover="this.style.opacity='0.8'" 
                 onmouseout="this.style.opacity='1'">
        </a>
    </div>
</header>

            <div class="page-header">
                <div>
                    <h1>Ringkasan Hari Ini</h1>
                    <p>Pantau performa dan aktivitas terkini Anda.</p>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <h3 class="card-title">ERD Pesanan <br><span style="font-size:12px; color:#777;">(30 Hari Terakhir)</span></h3>
                    <div class="erd-labels"><span>Dibuat</span><span>Dikirim</span></div>
                </div>
                <div class="card">
                    <h3 class="card-title">ERD Data <br>Produk: Kopi Arabika</h3>
                    <div class="erd-labels" style="justify-content:space-between;"><span>Dilihat</span><span>Diklik</span><span>Suka</span><span>Keranjang</span></div>
                </div>
                <div class="card">
                    <h3 class="card-title">Tren Penjualan</h3>
                    <div class="chart-container">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M0,40 L0,35 C15,30 30,15 50,5 C70,-5 85,5 100,5 L100,40 Z" fill="#EAF2D3"/><path d="M0,35 C15,30 30,15 50,5 C70,-5 85,5 100,5" fill="none" stroke="#6D8A21" stroke-width="2.5"/></svg>
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">Data Kunjungan Harian</h3>
                    <div class="chart-container">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M5,35 L20,30 L35,35 L50,20 L65,25 L85,15" fill="none" stroke="#6D8A21" stroke-width="2.5"/></svg>
                    </div>
                </div>
                <div class="card full-width-card">
                    <h3 class="card-title">Campaign Aktif per Hari</h3>
                    <div class="chart-container chart-large">
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%; height:100%;"><path d="M5,35 L15,33 L25,33 L30,22 L45,22 L50,15 L60,15 L65,18 L75,18 L85,20 L90,20 L100,5" fill="none" stroke="#B4D368" stroke-width="3"/></svg>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/admin-core.js"></script>
</body>
</html>
