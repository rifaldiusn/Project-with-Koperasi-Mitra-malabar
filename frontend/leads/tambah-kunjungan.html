<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Kunjungan - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Tambah Kunjungan</h1>
                    <p>Catat rincian pertemuan dengan prospek atau anggota koperasi.</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="kunjungan.html" class="btn btn-outline">Batal</a>
                    <button type="submit" form="form-kunjungan" class="btn btn-primary">Simpan Kunjungan</button>
                </div>
            </div>

            <div class="form-card">
                <h2 class="form-card-title">Detail Kunjungan</h2>
                
                <form id="form-kunjungan">
                    <div class="form-group">
                        <label class="form-label">Nama Kunjungan <span class="required-star">*</span></label>
                        <input type="text" id="input-nama" class="form-control" placeholder="Masukkan nama kunjungan" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Customer <span class="required-star">*</span></label>
                        <select class="form-control" id="input-customer" required>
                            <option value="">Memuat data customer...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Catatan Kunjungan <span class="required-star">*</span></label>
                        <textarea id="input-catatan" class="form-control" rows="4" placeholder="Tuliskan hasil diskusi, kesepakatan, atau observasi selama kunjungan..." required></textarea>
                    </div>

                    <div class="section-header" style="margin-top: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <h3 class="section-title" style="font-size: 1rem; font-weight: 600; margin: 0;">Data Lokasi</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Latitude <span class="required-star">*</span></label>
                            <input type="text" id="input-lat" class="form-control" readonly placeholder="Mengambil lokasi otomatis..." required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Longitude <span class="required-star">*</span></label>
                            <input type="text" id="input-long" class="form-control" readonly placeholder="Mengambil lokasi otomatis..." required>
                        </div>
                    </div>

                    <h3 class="form-card-title" style="margin-top: 2rem; margin-bottom: 1rem;">Dokumentasi</h3>
                    <div class="form-group">
                        <label class="form-label">Upload Bukti Foto</label>
                        <div class="upload-box" onclick="document.getElementById('input-file').click()">
                            <input type="file" id="input-file" accept="image/*" style="display:none;" required onchange="document.getElementById('file-name').textContent = this.files[0] ? this.files[0].name : ''">
                            <i class="ph ph-image" style="font-size: 2rem; color: #888; margin-bottom: 0.5rem;"></i>
                            <p class="upload-title">Klik atau seret foto ke area ini</p>
                            <p class="upload-subtitle">Format JPG, PNG (Maks. 5MB)</p>
                            <p id="file-name" style="margin-top:0.5rem; font-weight:600; color:#333;"></p>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-form-kunjungan.js"></script>
</body>
</html>
