<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/profil.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>Profil Saya</h1>
                    <p>Lihat dan kelola informasi akun Anda.</p>
                </div>
            </div>

            <div class="profile-layout">
                <div class="profile-card align-center" style="height: fit-content;">
                    <div class="avatar-wrapper">
                        <div class="avatar-main" id="user-avatar-initial" style="display:flex; align-items:center; justify-content:center; background-color:var(--primary-dark); color:white; font-size:3rem; font-weight:bold; box-sizing:border-box;">
                            A
                        </div>
                    </div>
                    <h2 class="profile-name" id="user-name-display">Test Leads</h2>
                    <p class="profile-role" id="user-role-display">Sales/Leads</p>
                </div>

                <div class="profile-card">
                    <div class="card-header">
                        <i class="ph ph-user" style="font-size: 20px; color: #4A5B22;"></i>
                        <h3>Profil & Jabatan</h3>
                    </div>

                    <div class="info-grid">
                        <div class="form-group">
                            <label class="form-label">Nama Lengkap</label>
                            <div class="info-field" id="info-nama">Test Leads</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Jabatan</label>
                            <div class="info-field" id="info-jabatan">Sales/Leads</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <div class="info-field" id="info-email">leads@mitramalabar.co.id</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">No Telepon</label>
                            <div class="info-field" id="info-telp">+62 812-3456-7891</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <div class="info-field" id="info-username">leads</div>
                        </div>
                    </div>

                    <div style="margin-top: 2.5rem;">
                        <button id="btn-logout" class="btn btn-logout">
                            <i class="ph ph-sign-out" style="margin-right: 0.5rem;"></i>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/profil.js?v=2"></script>
</body>
</html>
