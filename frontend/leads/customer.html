<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Customer - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-text" style="color:#4A5B22;">Mitra Malabar</div></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">Dashboard</a>
                <a href="customer.html" class="menu-item active">Customer</a>
                <a href="kunjungan.html" class="menu-item">Kunjungan</a>
                <a href="produk.html" class="menu-item">Produk</a>
                <a href="riwayat.html" class="menu-item">Riwayat</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
    <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Cari...">
    </div>
    
    <div class="user-profile">
        <button class="btn-icon">🔔</button>
        <button class="btn-icon">⚙️</button>
        
        <a href="profil.html" style="display: flex; align-items: center;">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=150&q=80" 
                 alt="User" 
                 class="avatar" 
                 style="cursor: pointer; transition: opacity 0.2s; border: 2px solid #547115;" 
                 onmouseover="this.style.opacity='0.8'" 
                 onmouseout="this.style.opacity='1'">
        </a>
    </div>
</header>

            <div class="page-header">
                <div>
                    <h1>Data Customer</h1>
                    <p>Manage your customer leads and active members.</p>
                </div>
                <a href="tambah-customer.html" class="btn" style="background:#4A5B22; color:white;">+ Tambah Customer</a>
            </div>

            <div class="filter-container">
                <input type="text" id="search-cust" class="form-control" placeholder="Cari nama, email, atau no telepon..." style="flex:2;">
                <select id="filter-status" class="form-control" style="flex:1;">
                    <option value="">Semua Status</option>
                    <option value="aktif">Aktif</option>
                </select>
                <input type="date" id="filter-date" class="form-control" style="flex:1;">
            </div>

            <table class="data-table" style="background:#fff; border-radius:8px;">
                <thead>
                    <tr><th>No</th><th>Nama</th><th>No Telepon</th><th>Email</th><th style="text-align:right;">Aksi</th></tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
            
            <div class="pagination" style="margin-top:0;">
                <span id="page-info" style="color:#777; font-size:14px;">Showing 1 to 5 of 42 entries</span>
                <div class="page-numbers">
                    <button class="page-btn">Previous</button>
                    <button class="page-btn active" style="background:#4A5B22; color:#fff;">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">Next</button>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-customer.js"></script>
</body>
</html>
