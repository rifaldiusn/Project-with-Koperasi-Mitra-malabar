<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Customer - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Data Customer</h1>
                    <p>Manage your customer leads and active members.</p>
                </div>
                <a href="tambah-customer.html" class="btn btn-primary">
                    <i class="ph ph-plus" style="margin-right: 0.5rem;"></i>
                    Tambah Customer
                </a>
            </div>

            <div class="filter-container">
                <input type="text" id="search-cust" class="form-control" placeholder="Cari nama, email, atau no telepon..." style="flex:2;">
                <select id="filter-status" class="form-control" style="flex:1;">
                    <option value="">Semua Status</option>
                    <option value="aktif">Aktif</option>
                </select>
                <input type="date" id="filter-date" class="form-control" style="flex:1;">
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>No</th><th>Nama</th><th>No Telepon</th><th>Email</th><th>Link</th><th style="text-align:right;">Aksi</th></tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rendered by admin-customer.js -->
                    </tbody>
                </table>
            </div>
            
            <div class="pagination" style="margin-top:0;">
                <span id="page-info" style="color:#777; font-size:14px;">Showing 1 to 5 of 42 entries</span>
                <div class="page-numbers">
                    <button class="page-btn">Previous</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">Next</button>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-customer.js"></script>
</body>
</html>
