<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Campaign - Koperasi Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>Data Campaign</h1>
                    <p>Kelola dan pantau semua program campaign.</p>
                </div>
                <button class="btn btn-primary" id="btn-tambah-campaign">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Tambah Campaign
                </button>
            </div>

            <div id="error-message" class="alert alert-error" style="display:none;"></div>

            <div class="card-grid" id="campaign-grid">
                <!-- Data will be loaded here via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Form Tambah/Edit Campaign -->
    <div class="modal-overlay" id="modal-campaign">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Tambah Campaign</h2>
                <button class="modal-close" id="btn-close-modal">&times;</button>
            </div>
            <div id="modal-error" class="alert alert-error" style="display:none;"></div>
            <form id="form-campaign">
                <input type="hidden" id="camp-id">
                
                <div class="form-group">
                    <label class="form-label">Nama Campaign</label>
                    <input type="text" id="camp-nama" class="form-control" required placeholder="Cth: Instagram Ads">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Keterangan</label>
                    <textarea id="camp-ket" class="form-control" rows="3" required placeholder="Program Menyebarluaskan melalui instagram ads"></textarea>
                </div>

                <div style="display:flex; gap:1rem;">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Tanggal Mulai</label>
                        <input type="date" id="camp-start" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Tanggal Selesai</label>
                        <input type="date" id="camp-end" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Budget (Rp)</label>
                    <input type="number" id="camp-budget" class="form-control" required placeholder="10000000">
                </div>

                <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" id="btn-cancel-modal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btn-submit-modal">Simpan Campaign</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Injection -->
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/campaign.js"></script>
</body>
</html>
