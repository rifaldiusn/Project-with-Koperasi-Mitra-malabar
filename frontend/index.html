<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Koperasi Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            display: flex;
            height: 100vh;
        }
        .login-left {
            flex: 1;
            background-color: #C9DFAD; /* Light green */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .login-left img {
            max-width: 80%;
            height: auto;
            z-index: 2;
        }
        .login-right {
            flex: 1;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 6rem;
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .logo-circle {
            width: 40px;
            height: 40px;
            background-color: var(--primary-color);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
        }
        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary-color);
        }
        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .btn-login {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <!-- Placeholder for illustration -->
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column;">
                <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="#547115" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <h2 style="color: #547115; margin-top: 1rem;">Pertumbuhan & Keuangan</h2>
            </div>
        </div>
        <div class="login-right">
            <div class="login-logo">
                <div class="logo-circle">M</div>
                <div class="logo-text">Koperasi Mitra Malabar</div>
            </div>
            
            <div class="login-header">
                <h1>Masuk ke Akun</h1>
                <p>Selamat datang kembali. Silakan masukkan detail Anda.</p>
            </div>

            <div id="error-alert" class="alert alert-error" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username Anda" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">Masuk</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
