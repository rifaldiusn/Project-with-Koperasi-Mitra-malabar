<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk - Koperasi Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>Daftar Produk</h1>
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <a href="produk-detail.html" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Tambah Produk
                    </a>
                    <button class="btn btn-primary" style="background-color: var(--secondary-color);" id="btn-input-excel">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M21.2 15c.7-1.2 1-2.5.7-3.9-.6-2-2.4-3.5-4.4-3.5h-1.2c-.7-3-3.2-5.2-6.2-5.6-3-.3-5.9 1.3-7.3 4-1.2 2.5-1 6.5.5 8.8m8.7-1.6V21"></path><path d="M16 16l-4-4-4 4"></path></svg>
                        Input Excell
                    </button>
                    <!-- Hidden file input for excel -->
                    <input type="file" id="excel-file" accept=".xlsx" style="display:none;">
                </div>
            </div>

            <div class="filters-bar" style="background-color: var(--white); padding: 1rem; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between;">
                <div class="search-input" style="position:relative; width:100%; max-width: 500px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; left:10px; top:12px; color:var(--text-muted)"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-produk" class="form-control" placeholder="Search products..." style="padding-left:35px; background-color: #f9f9f9; border:none;">
                </div>
                <button class="btn btn-outline" style="border:none; color:var(--text-muted);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg> Filter</button>
            </div>

            <div id="error-message" class="alert alert-error" style="display:none; margin-top:1rem;"></div>
            <div id="success-message" class="alert" style="display:none; background-color:#D1FAE5; color:#065F46; border: 1px solid #A7F3D0; margin-top:1rem;"></div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Product Name</th>
                            <th>Product Code</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="produk-table-body">
                        <!-- Data will be loaded here via JS -->
                    </tbody>
                </table>
                <div class="pagination">
                    <div style="font-size: 0.875rem; color: var(--text-muted);" id="pagination-info">Showing 0 entries</div>
                    <div class="page-numbers" id="pagination-numbers"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Injection -->
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/produk.js"></script>
</body>
</html>
