<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Aktivitas - Koperasi Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>Riwayat Aktivitas</h1>
                    <p>Log sistem dan aktivitas pengguna aplikasi.</p>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Pengguna</th>
                            <th>Modul</th>
                            <th>Aktivitas</th>
                        </tr>
                    </thead>
                    <tbody id="riwayat-table-body">
                        <!-- Data will be loaded here via JS -->
                    </tbody>
                </table>
                <div class="pagination">
                    <div style="font-size: 0.875rem; color: var(--text-muted);" id="pagination-info">Showing 0 entries</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Injection -->
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/riwayat.js"></script>
</body>
</html>
