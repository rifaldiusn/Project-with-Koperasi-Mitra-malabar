<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Ringkasan Hari Ini</h1>
                    <p>Pantau performa dan aktivitas terkini Anda.</p>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card" style="grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <h3 class="card-title">ERD Pesanan</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="erd-pesan-year" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <!-- Will be populated by JS -->
                            </select>
                            <select id="erd-pesan-start-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            <span>-</span>
                            <select id="erd-pesan-end-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12" selected>Des</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="erdPesananChart"></canvas>
                    </div>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <h3 class="card-title">ERD Data Produk (Keseluruhan)</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="erd-data-year" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                            </select>
                            <select id="erd-data-start-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            <span>-</span>
                            <select id="erd-data-end-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12" selected>Des</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="erdDataChart"></canvas>
                    </div>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <h3 class="card-title">Tren Penjualan</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
                            <select id="tren-penjualan-variasi" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem; max-width: 150px;">
                                <option value="">Semua Variasi</option>
                            </select>
                            <select id="tren-penjualan-year" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                            </select>
                            <select id="tren-penjualan-start-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            <span>-</span>
                            <select id="tren-penjualan-end-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12" selected>Des</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="trenPenjualanChart"></canvas>
                    </div>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <h3 class="card-title">Data Kunjungan</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
                            <select id="kunjungan-year" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                            </select>
                            <select id="kunjungan-start-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            <span>-</span>
                            <select id="kunjungan-end-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12" selected>Des</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="kunjunganChart"></canvas>
                    </div>
                </div>
                <div class="card full-width-card" style="grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <h3 class="card-title">Data Campaign</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
                            <select id="campaign-year" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                            </select>
                            <select id="campaign-start-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            <span>-</span>
                            <select id="campaign-end-month" class="form-control" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                <option value="4">Apr</option><option value="5">Mei</option><option value="6">Jun</option>
                                <option value="7">Jul</option><option value="8">Agu</option><option value="9">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12" selected>Des</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container chart-large" style="height: 350px;">
                        <canvas id="campaignChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
