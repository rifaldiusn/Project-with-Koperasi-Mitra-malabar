<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Campaign - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- ponytail: Reused campaign page directly for admin. YAGNI on duplicating layout and js. -->
    <div class="app-container">
        <main class="main-content">
            <div class="page-header header-spacing">
                <div class="page-title">
                    <h1>Data Campaign</h1>
                    <p>Kelola dan pantau semua program campaign.</p>
                </div>
                <a href="tambah-campaign.html" class="btn btn-primary">
                    <i class="ph ph-plus" style="margin-right:0.5rem;"></i>
                    Tambah Campaign
                </a>
            </div>

            <div class="view-toggle-pill">
                <button class="btn-icon active-view" data-tab-target="grid">
                    <i class="ph-fill ph-squares-four"></i>
                </button>
                <button class="btn-icon" data-tab-target="list">
                    <i class="ph ph-list"></i>
                </button>
            </div>

            <div class="campaign-grid" id="campaign-grid-container" data-tab-content="grid">
                <div class="campaign-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <h3 class="campaign-title">Launching Kopi Arabika</h3>
                        <div class="dropdown-wrapper">
                            <button class="dropdown-toggle" data-dropdown-target="dropdown-campaign-1">
                                <i class="ph ph-dots-three-vertical" style="font-size: 20px;"></i>
                            </button>
                            <div class="dropdown-menu" id="dropdown-campaign-1">
                                <a href="campaign-detail.html" class="dropdown-item">
                                    <i class="ph ph-eye" style="margin-right: 0.5rem;"></i>Lihat Detail
                                </a>
                                <a href="edit-campaign.html" class="dropdown-item">
                                    <i class="ph ph-pencil" style="margin-right: 0.5rem;"></i>Edit
                                </a>
                                <button class="dropdown-item danger">
                                    <i class="ph ph-trash" style="margin-right: 0.5rem;"></i>Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                    <p class="campaign-desc">Promo peluncuran produk baru dengan diskon 20%</p>
                    <div class="campaign-meta">
                        <span class="meta-item"><i class="ph ph-calendar"></i> 1 Jan - 31 Jan 2026</span>
                        <span class="status-pill status-active"><i class="ph-fill ph-circle"></i> Aktif</span>
                    </div>
                    <a href="campaign-detail.html" class="btn-text-action">Lihat Detail <i class="ph ph-arrow-right"></i></a>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js?v=3"></script>
    <script src="../js/layout.js?v=3"></script>
    <script src="../js/admin-core.js?v=3"></script>
    <script src="../js/campaign.js?v=3"></script>
</body>
</html>
