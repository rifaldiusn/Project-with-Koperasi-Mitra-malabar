<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-text" style="color:#4A5B22;">Mitra Malabar</div></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item active">Dashboard</a>
                <a href="customer.html" class="menu-item">Customer</a>
                <a href="kunjungan.html" class="menu-item">Kunjungan</a>
                <a href="campaign.html" class="menu-item">Campaign</a>
                <a href="produk.html" class="menu-item">Produk</a>
                <a href="riwayat.html" class="menu-item">Riwayat</a>
                <a href="kelola-akun.html" class="menu-item" style="margin-top:2rem;">Kelola Akun</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header" style="margin-bottom: 2rem;">
                <h1>Edit Customer</h1>
            </div>

            <div class="form-card">
                <h2 class="form-card-title">Informasi Customer</h2>
                <p class="form-card-subtitle">Perbarui data di bawah ini untuk mengubah profil nasabah dalam sistem Leads.</p>

                <form id="form-edit-customer">
                    <input type="hidden" id="cust-id">
                    
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="cust-nama" class="form-control" placeholder="Masukkan nama lengkap sesuai identitas" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nomor Telepon</label>
                            <input type="text" id="cust-telp" class="form-control" placeholder="Contoh: 081234567890" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="cust-email" class="form-control" placeholder="alamat@email.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis Customer</label>
                        <select id="cust-jenis" class="form-control" required>
                            <option value="">Pilih jenis customer</option>
                            <option value="cafe">Cafe</option>
                            <option value="retail">Retail</option>
                            <option value="perorangan">Perorangan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Alamat Domisili</label>
                        <textarea id="cust-alamat" class="form-control" rows="3" placeholder="Masukkan alamat lengkap (Jalan, RT/RW, Desa/Kelurahan)" required></textarea>
                    </div>

                    <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:2rem;">
                        <a href="customer.html" class="btn btn-outline">Batal</a>
                        <button type="submit" class="btn" style="background:#A3C644; color:#fff;" id="btn-submit">Simpan Customer</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script src="../js/admin-core.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin-edit-customer.js"></script>
</body>
</html>
