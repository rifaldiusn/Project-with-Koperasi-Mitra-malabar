<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        /* Style Khusus Badge Role di Tabel */
        .badge-role {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-leads { background-color: #EAF2D3; color: #4A5B22; }
        .badge-admin { background-color: #D1E2A3; color: #334015; }
        .badge-campaign { background-color: #F1F1F1; color: #555555; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-green { background-color: #6D8A21; }
        .dot-gray { background-color: #888888; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo-text">Mitra Malabar</div></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">Dashboard</a>
                <a href="customer.html" class="menu-item">Customer</a>
                <a href="kunjungan.html" class="menu-item">Kunjungan</a>
                <a href="campaign.html" class="menu-item">Campaign</a>
                <a href="produk.html" class="menu-item">Produk</a>
                <a href="riwayat.html" class="menu-item">Riwayat</a>
                <a href="kelola-akun.html" class="menu-item active" style="margin-top:2rem;">Kelola Akun</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Cari...">
                </div>
                <div class="user-profile">
                    <button class="btn-icon">🔔</button>
                    <button class="btn-icon">⚙️</button>
                    <a href="profil.html" style="display: flex; align-items: center;">
                        <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=150&q=80" alt="User" class="avatar" style="cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                    </a>
                </div>
            </header>

            <div class="page-header">
                <div class="page-title">
                    <h1>Daftar Akun</h1>
                </div>
                <a href="tambah-akun.html" class="btn btn-primary">+ Tambah Akun</a>
            </div>

            <div class="filter-container">
                <div style="position:relative; flex:1;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" style="position:absolute; left:12px; top:12px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-akun" class="form-control" placeholder="Cari username atau nama..." style="padding-left:35px; background-color:#FDFCF4; border-color:#E2E2D6;">
                </div>
                <button class="btn btn-outline" style="background-color:#FDFCF4;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Filter
                </button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Username</th>
                            <th>Nama</th>
                            <th>No Telepon</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="akun-table-body">
                        </tbody>
                </table>
                <div class="pagination">
                    <span id="page-info" style="color:#777; font-size:14px;">Showing 1 to 5 of 24 entries</span>
                    <div class="page-numbers">
                        <button class="page-btn">❮</button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <span style="color:#888;">...</span>
                        <button class="page-btn">❯</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-akun.js"></script>
</body>
</html>
