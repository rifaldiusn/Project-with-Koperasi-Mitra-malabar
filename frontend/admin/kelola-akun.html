<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>Daftar Akun</h1>
                    <p>Kelola semua akun pengguna aplikasi.</p>
                </div>
                <a href="tambah-akun.html" class="btn btn-primary">
                    <i class="ph ph-plus" style="margin-right: 0.5rem;"></i>
                    Tambah Akun
                </a>
            </div>

            <div class="filter-container">
                <div style="position:relative; flex:1;">
                    <i class="ph ph-magnifying-glass" style="position:absolute; left:12px; top:12px; color:#aaa;"></i>
                    <input type="text" id="search-akun" class="form-control" placeholder="Cari username atau nama..." style="padding-left:35px;">
                </div>
                <select id="filter-role" class="form-control" style="width: auto;">
                    <option value="">Semua Role</option>
                    <option value="1">Admin</option>
                    <option value="2">Leads</option>
                    <option value="3">Campaign</option>
                </select>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Username</th>
                            <th>Nama</th>
                            <th>No Telepon</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="akun-table-body">
                        <tr>
                            <td>1</td>
                            <td>admin</td>
                            <td>Test Admin</td>
                            <td>08123456789</td>
                            <td>••••••••</td>
                            <td>
                                <span class="badge-role badge-admin">
                                    <span class="dot dot-green"></span> Admin
                                </span>
                            </td>
                            <td style="text-align:right;">
                                <div class="dropdown-wrapper">
                                    <button class="dropdown-toggle" data-dropdown-toggle="dropdown-akun-1">
                                        <i class="ph ph-dots-three-vertical" style="font-size: 20px;"></i>
                                    </button>
                                    <div class="dropdown-menu" id="dropdown-akun-1">
                                        <a href="edit-akun.html" class="dropdown-item">
                                            <i class="ph ph-pencil" style="margin-right: 0.5rem;"></i>Edit
                                        </a>
                                        <button class="dropdown-item danger">
                                            <i class="ph ph-trash" style="margin-right: 0.5rem;"></i>Hapus
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="pagination">
                    <span id="page-info" style="color:#777; font-size:14px;">Showing 1 to 5 of 24 entries</span>
                    <div class="page-numbers">
                        <button class="page-btn"><i class="ph ph-caret-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <span style="color:#888;">...</span>
                        <button class="page-btn"><i class="ph ph-caret-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-akun.js"></script>
</body>
</html>
