<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <form id="form-produk">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 id="page-title">Tambah Produk</h1>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <a href="produk.html" class="btn btn-outline">Batal</a>
                        <button type="submit" class="btn btn-primary">Simpan Produk</button>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:1.5rem;">
                    
                    <div class="detail-card">
                        <div class="card-title-icon" style="margin-bottom: 1rem;">
                            <i class="ph ph-info" style="color:#6D8A21; font-size:1.25rem;"></i> Informasi Dasar
                        </div>
                        <div style="display:flex; gap:3rem;">
                            <div style="flex:1;">
                                <div class="form-group">
                                    <label class="form-label">Nama Produk</label>
                                    <input type="text" id="prod-nama" class="form-control" placeholder="Kopi Arabika Malabar" required>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Kode Produk (SKU)</label>
                                        <input type="text" id="prod-sku" class="form-control" placeholder="MLB-ARB-001" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Status Produk</label>
                                        <div class="status-toggle-group">
                                            <label class="status-radio active">
                                                <input type="radio" name="status" value="Active" checked> 
                                                <i class="ph-fill ph-check-circle" style="color:#6D8A21;"></i> Active
                                            </label>
                                            <label class="status-radio">
                                                <input type="radio" name="status" value="Draft"> 
                                                <i class="ph ph-circle"></i> Draft
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                </div>
            </form>
        </main>
    </div>
    
    <script src="../js/api.js?v=4"></script>
    <script src="../js/layout.js?v=4"></script>
    <script src="../js/admin-core.js?v=4"></script>
    <script src="../js/admin-form-produk.js?v=4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await api.get('/produk/');
                console.log('Produk data loaded:', response);
            } catch (error) {
                console.error('Failed to load produk:', error);
            }
        });
    </script>
</body>
</html>
