<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk - Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- ponytail: Reused produk page directly for admin. YAGNI on duplicating layout and js. -->
    <div class="app-container">
        <main class="main-content">
            <div class="page-header header-spacing" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="page-title">
                    <h1 style="margin: 0;">Daftar Produk</h1>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="tambah-produk.html" class="btn btn-primary">
                        <i class="ph ph-plus" style="margin-right:0.5rem;"></i> Tambah Produk
                    </a>
                    <button class="btn btn-outline" id="btn-input-excel">
                        <i class="ph ph-cloud-arrow-up" style="margin-right:0.5rem;"></i> Input Excell
                    </button>
                    <input type="file" id="excel-file" accept=".xlsx, .xls" style="display: none;">
                </div>
            </div>
            
            <div id="error-message" style="display: none; color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px;"></div>
            <div id="success-message" style="display: none; color: #155724; background-color: #d4edda; padding: 10px; border-radius: 5px; margin-bottom: 15px;"></div>

            <div class="filter-container search-white">
                <div class="search-wrapper" style="border:none; padding:0; width:100%; background: transparent;">
                    <i class="ph ph-magnifying-glass" style="color:#aaa;"></i>
                    <input type="text" id="search-produk" class="form-control" placeholder="Cari berdasarkan nama atau kode produk..." style="padding-left:35px; width:100%; background:transparent;">
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Product Name</th>
                            <th>Product Code</th>
                            <th>Status</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="produk-table-body">
                        <!-- Diisi otomatis oleh JavaScript -->
                    </tbody>
                </table>
                <div class="pagination" style="color:#777; font-size:0.875rem;">
                    <span id="page-info"></span>
                    <div class="page-numbers">
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/api.js?v=8"></script>
    <script src="../js/layout.js?v=8"></script>
    <script src="../js/admin-core.js?v=8"></script>
    <script src="../js/produk.js?v=8"></script>
</body>
</html>
