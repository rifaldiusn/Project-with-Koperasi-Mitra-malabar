<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Produk Terpadu - Koperasi Mitra Malabar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .detail-section {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .section-header h3 {
            font-size: 1.125rem;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="page-header" style="align-items: center;">
                <div class="page-title">
                    <h1 style="margin:0;">Manajemen Produk Terpadu</h1>
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <a href="produk.html" class="btn btn-outline">Batal</a>
                    <button class="btn btn-primary" id="btn-save-produk">Simpan Perubahan</button>
                </div>
            </div>

            <div id="error-message" class="alert alert-error" style="display:none;"></div>
            <div id="success-message" class="alert" style="display:none; background-color:#D1FAE5; color:#065F46; border: 1px solid #A7F3D0;"></div>

            <form id="form-produk">
                <!-- Informasi Dasar -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> Informasi Dasar</h3>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Nama Produk</label>
                            <input type="text" id="p-nama" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Kategori</label>
                            <select id="p-kategori" class="form-control">
                                <option value="Biji Kopi">Biji Kopi</option>
                                <option value="Bubuk Kopi">Bubuk Kopi</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Kode Produk (SKU)</label>
                            <input type="text" id="p-kode" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status Produk</label>
                            <div style="display:flex; gap:1rem;">
                                <label style="display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; border:1px solid var(--border-color); border-radius:6px; flex:1; cursor:pointer;" id="lbl-status-active">
                                    <input type="radio" name="p_status" value="Active" checked> Active
                                </label>
                                <label style="display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; border:1px solid var(--border-color); border-radius:6px; flex:1; cursor:pointer;" id="lbl-status-draft">
                                    <input type="radio" name="p_status" value="Draft"> Draft
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Variasi Produk Table -->
                    <div style="margin-top: 2rem;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                            <h4 style="margin:0; font-size:1rem; color:var(--text-main); display:flex; align-items:center; gap:0.5rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Variasi Produk</h4>
                            <button type="button" class="btn btn-outline" style="padding:0.25rem 0.5rem; font-size:0.75rem; border:none; color:var(--primary-dark); font-weight:600;" onclick="tambahVariasi()">+ Tambah Variasi</button>
                        </div>
                        <table class="data-table" style="background:#F9F9F4; border-radius:6px; overflow:hidden;">
                            <thead>
                                <tr>
                                    <th style="background:#F2F2E9;">NAMA VARIASI</th>
                                    <th style="background:#F2F2E9;">KODE VARIASI</th>
                                    <th style="background:#F2F2E9;">HARGA (RP)</th>
                                    <th style="background:#F2F2E9;">STATUS</th>
                                    <th style="background:#F2F2E9;">AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="variasi-body">
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Metrik Interaksi -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> Metrik Interaksi</h3>
                    </div>
                    <h4 style="font-size:0.875rem; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Periode data produk</h4>
                    <div class="grid-2">
                        <div class="form-group"><label class="form-label">Tanggal Mulai</label><input type="date" class="form-control"></div>
                        <div class="form-group"><label class="form-label">Tanggal Selesai</label><input type="date" class="form-control"></div>
                        <div class="form-group"><label class="form-label">Jumlah dilihat</label><input type="number" class="form-control" value="1240" readonly></div>
                        <div class="form-group"><label class="form-label">Jumlah diklik</label><input type="number" class="form-control" value="456" readonly></div>
                        <div class="form-group"><label class="form-label">Jumlah suka</label><input type="number" class="form-control" value="89" readonly></div>
                        <div class="form-group"><label class="form-label">Jumlah masukkan keranjang</label><input type="number" class="form-control" value="34" readonly></div>
                    </div>
                </div>

                <!-- Pelacakan Pesanan -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg> Pelacakan Pesanan</h3>
                    </div>
                    <div class="form-group" style="max-width: 50%;">
                        <label class="form-label">Periode produk dipesan</label>
                        <input type="month" class="form-control" value="2024-03">
                    </div>
                </div>

                <!-- Metrik Produksi -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Metrik Produksi</h3>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Jumlah produk dibuat (Unit)</label>
                        <input type="number" class="form-control" value="1250">
                    </div>
                </div>

                <!-- Logistik Pengiriman -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg> Logistik Pengiriman</h3>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Jumlah produk dikirim (Unit)</label>
                        <input type="number" class="form-control" value="850">
                    </div>
                </div>

                <!-- Analisis Penjualan -->
                <div class="detail-section">
                    <div class="section-header">
                        <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> Analisis Penjualan</h3>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Periode data produk penjualan</label>
                        <input type="month" class="form-control" value="2023-11">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Jumlah nominal penjualan</label>
                            <input type="text" class="form-control" value="Rp 45.500.000" id="penj-nominal" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Jenis penjualan</label>
                            <select class="form-control" id="penj-jenis">
                                <option value="Retail (Eceran)">Retail (Eceran)</option>
                                <option value="Grosir">Grosir</option>
                            </select>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- Script Injection -->
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/produk-detail.js"></script>
</body>
</html>
